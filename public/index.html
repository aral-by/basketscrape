<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BasketScrape</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #09090b;
      --card:         #18181b;
      --border:       #27272a;
      --border-light: #3f3f46;
      --text:         #fafafa;
      --muted:        #a1a1aa;
      --dim:          #71717a;
      --primary:      #818cf8;
      --primary-bg:   rgba(129,140,248,0.12);
      --primary-bdr:  rgba(129,140,248,0.35);
      --live:         #22c55e;
      --live-bg:      rgba(34,197,94,0.12);
      --danger:       #f87171;
      --danger-bg:    rgba(248,113,113,0.12);
      --warn:         #fbbf24;
      --warn-bg:      rgba(251,191,36,0.12);
      --radius:       8px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
    }

    .card-heading {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: var(--bg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 12px;
    }

    input[type="text"]:focus { border-color: var(--primary); }
    input[type="text"]::placeholder { color: var(--dim); }

    button {
      width: 100%;
      padding: 9px 16px;
      background: var(--primary);
      border: none;
      border-radius: var(--radius);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
      letter-spacing: 0.2px;
    }

    button:hover:not(:disabled) { opacity: 0.88; }

    button:disabled {
      background: var(--border-light);
      color: var(--dim);
      cursor: not-allowed;
      opacity: 1;
    }

    .status-box {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .status-box::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-box.not_started {
      display: flex;
      background: var(--warn-bg);
      border: 1px solid rgba(251,191,36,0.3);
      color: var(--warn);
    }
    .status-box.not_started::before { background: var(--warn); }

    .status-box.running {
      display: flex;
      background: var(--live-bg);
      border: 1px solid rgba(34,197,94,0.3);
      color: var(--live);
    }
    .status-box.running::before { background: var(--live); animation: pulse 2s infinite; }

    .status-box.finished,
    .status-box.error {
      display: flex;
      background: var(--danger-bg);
      border: 1px solid rgba(248,113,113,0.3);
      color: var(--danger);
    }
    .status-box.finished::before,
    .status-box.error::before { background: var(--danger); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .analysis-link {
      display: none;
      margin-top: 12px;
      width: 100%;
      padding: 9px 16px;
      background: transparent;
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .analysis-link:hover { border-color: var(--primary); color: var(--primary); }

    .stop-btn {
      display: none;
      margin-top: 8px;
      width: 100%;
      padding: 9px 16px;
      background: transparent;
      border: 1px solid rgba(248,113,113,0.4);
      border-radius: var(--radius);
      color: var(--danger);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .stop-btn:hover { background: var(--danger-bg); border-color: var(--danger); }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 20px 0;
    }

    .hint {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="brand">
    <div class="brand-icon">🏀</div>
    <span class="brand-name">BasketScrape</span>
  </div>

  <div class="card">
    <div class="card-heading">Maç Takibi Başlat</div>
    <div class="card-sub">Flashscore maç URL'sini girerek canlı veri çekmeye başla.</div>

    <label for="urlInput">Maç URL'si</label>
    <input type="text" id="urlInput" placeholder="https://www.flashscore.com/mac/..." />
    <button id="startBtn">Başlat</button>

    <div class="status-box" id="statusBox"></div>
    <a href="/analysis.html" id="analysisLink" class="analysis-link">Analiz Paneline Git →</a>
    <button id="stopBtn" class="stop-btn">Maçtan Çık</button>

    <div class="divider"></div>
    <p class="hint">Maç başlamadan önce URL girip başlatabilirsin — sistem maç saatini bekler ve otomatik olarak takibe geçer.</p>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
